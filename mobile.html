<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b0f17" />
<meta http-equiv="refresh" content="0; url=./?mobile=1" />
<title>Opening mobile version...</title>
<style>
  :root{
    --bg:#0b0f17;
    --panel:#121a2a;
    --border:#1f2a44;
    --text:#e5e7eb;
    --muted:#9aa4b2;
    --accent:#7c9cff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:radial-gradient(1200px 800px at 20% 0%,#15203a 0%,var(--bg) 60%) fixed;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif}
  body{display:grid;place-items:center;padding:20px}
  main{width:min(100%,460px);padding:24px;border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid var(--border);text-align:center}
  h1{font-size:20px;line-height:1.3;margin:0 0 10px}
  p{margin:0 0 14px;color:var(--muted);line-height:1.55}
  a{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:12px 16px;border-radius:12px;background:linear-gradient(135deg,#7c9cff,#a78bfa);color:#0b0f17;font-weight:700;text-decoration:none}
</style>
</head>
<body>
  <main>
    <h1>Opening the touch-first mobile version…</h1>
    <p>It works on any modern phone browser, but it feels best in Chrome.</p>
    <a href="./?mobile=1">Open mobile version</a>
  </main>
  <script>
    location.replace('./?mobile=1');
  </script>
</body>
</html>
